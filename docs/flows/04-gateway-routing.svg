<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="13">
  <rect width="900" height="580" fill="#0f1117"/>

  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">Gateway — Routing Flow (gateway.complete)</text>

  <!-- START -->
  <ellipse cx="450" cy="75" rx="130" ry="28" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="450" y="80" text-anchor="middle" fill="#cbd5e1">gateway.complete(prompt)</text>
  <text x="450" y="94" text-anchor="middle" fill="#94a3b8" font-size="10">t_start = time.monotonic()</text>

  <line x1="450" y1="103" x2="450" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>

  <!-- Cache enabled? -->
  <polygon points="450,130 570,162 450,194 330,162" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
  <text x="450" y="158" text-anchor="middle" fill="#c7d2fe">cache enabled?</text>
  <text x="450" y="176" text-anchor="middle" fill="#a5b4fc" font-size="10">cache.get(prompt)</text>

  <!-- cache HIT → return -->
  <line x1="570" y1="162" x2="720" y2="162" stroke="#4ade80" stroke-width="2" marker-end="url(#a-g)"/>
  <text x="640" y="150" fill="#4ade80" font-size="11" font-weight="bold">HIT</text>
  <rect x="728" y="140" width="145" height="46" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="800" y="158" text-anchor="middle" fill="#bbf7d0" font-size="11">GatewayResponse</text>
  <text x="800" y="174" text-anchor="middle" fill="#4ade80" font-size="10">route: "cache_hit:0.95"</text>

  <!-- MISS → down -->
  <line x1="450" y1="194" x2="450" y2="222" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  <text x="408" y="213" fill="#f97316" font-size="11">MISS</text>

  <!-- Loop: for each provider -->
  <rect x="240" y="222" width="420" height="30" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="450" y="242" text-anchor="middle" fill="#94a3b8" font-size="12">for i, provider in enumerate(providers):  [primary → backup]</text>

  <line x1="450" y1="252" x2="450" y2="278" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>

  <!-- allow_request? -->
  <polygon points="450,278 580,310 450,342 320,310" fill="#422006" stroke="#f97316" stroke-width="2"/>
  <text x="450" y="305" text-anchor="middle" fill="#fed7aa">breaker.allow_request()</text>
  <text x="450" y="323" text-anchor="middle" fill="#fb923c" font-size="10">circuit OPEN?</text>

  <!-- OPEN → circuit_open error → next provider -->
  <line x1="580" y1="310" x2="730" y2="310" stroke="#ef4444" stroke-width="2" marker-end="url(#a-r)"/>
  <text x="650" y="298" fill="#ef4444" font-size="11" font-weight="bold">OPEN</text>
  <rect x="738" y="290" width="145" height="40" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="810" y="308" text-anchor="middle" fill="#fca5a5" font-size="11">CircuitOpenError</text>
  <text x="810" y="322" text-anchor="middle" fill="#f87171" font-size="10">last_error = "circuit_open:X"</text>

  <!-- → next provider loop -->
  <path d="M 883 310 Q 883 380 580 380" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a-r)"/>
  <text x="840" y="375" fill="#ef4444" font-size="10">continue</text>

  <!-- CLOSED → call provider -->
  <line x1="450" y1="342" x2="450" y2="368" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  <text x="408" y="360" fill="#4ade80" font-size="11">CLOSED</text>

  <!-- provider.complete() -->
  <rect x="270" y="368" width="360" height="44" rx="8" fill="#1c1917" stroke="#f97316" stroke-width="2"/>
  <text x="450" y="388" text-anchor="middle" fill="#fed7aa" font-weight="bold">provider.complete(prompt)</text>
  <text x="450" y="404" text-anchor="middle" fill="#fb923c" font-size="11">FakeLLMProvider → latency + cost</text>

  <!-- SUCCESS -->
  <line x1="550" y1="390" x2="680" y2="430" stroke="#4ade80" stroke-width="2" marker-end="url(#a-g)"/>
  <text x="610" y="408" fill="#4ade80" font-size="11" font-weight="bold">SUCCESS</text>

  <!-- FAIL -->
  <line x1="350" y1="412" x2="240" y2="452" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#a-r)"/>
  <text x="275" y="435" fill="#ef4444" font-size="11" font-weight="bold">ProviderError</text>

  <!-- Success box -->
  <rect x="630" y="420" width="240" height="70" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="750" y="440" text-anchor="middle" fill="#bbf7d0" font-size="11">breaker.record_success()</text>
  <text x="750" y="456" text-anchor="middle" fill="#4ade80" font-size="11">cache.set(prompt, response)</text>
  <text x="750" y="472" text-anchor="middle" fill="#86efac" font-size="10">route: "primary" | "fallback:backup"</text>
  <text x="750" y="488" text-anchor="middle" fill="#4ade80" font-size="11">return GatewayResponse ✓</text>

  <!-- Fail box -->
  <rect x="90" y="452" width="220" height="50" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="200" y="472" text-anchor="middle" fill="#fca5a5" font-size="11">breaker.record_failure()</text>
  <text x="200" y="488" text-anchor="middle" fill="#f87171" font-size="10">last_error = "provider_error:X"</text>

  <!-- continue loop arrow -->
  <path d="M 90 475 Q 40 475 40 380 Q 40 252 240 252" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a-r)"/>
  <text x="30" y="420" fill="#ef4444" font-size="10" transform="rotate(-90 30 420)">continue</text>

  <!-- All fail → static fallback -->
  <line x1="450" y1="412" x2="450" y2="530" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <text x="370" y="480" fill="#94a3b8" font-size="10">all providers</text>
  <text x="370" y="493" fill="#94a3b8" font-size="10">exhausted</text>
  <rect x="290" y="530" width="320" height="40" rx="8" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="549" text-anchor="middle" fill="#fca5a5" font-weight="bold">Static Fallback</text>
  <text x="450" y="563" text-anchor="middle" fill="#f87171" font-size="10">route: "static_fallback" | error = last_error</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="a-r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="a-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
  </defs>
</svg>
